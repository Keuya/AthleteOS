<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1720" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AthleteOS" />
    <title>AthleteOS</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="icon" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="label">Adaptive fitness dashboard</p>
          <h1>Athlete<span>OS</span></h1>
        </div>
        <button id="installButton" class="icon-button install-hidden" type="button" aria-label="Install app">
          <span aria-hidden="true">+</span>
        </button>
      </header>

      <main id="screen" class="screen" aria-live="polite"></main>

      <nav class="bottom-nav" aria-label="Primary">
        <button class="nav-button is-active" type="button" data-tab="home">Home</button>
        <button class="nav-button" type="button" data-tab="log">Log</button>
        <button class="nav-button" type="button" data-tab="run">Run</button>
        <button class="nav-button" type="button" data-tab="body">Body</button>
        <button class="nav-button" type="button" data-tab="progress">Progress</button>
      </nav>
    </div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong>No logs yet</strong>
        <span>Start with today’s check-in or workout.</span>
      </div>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
